<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#5865F2" opacity="0.1"/>
  <circle cx="128" cy="128" r="115" fill="none" stroke="#5865F2" stroke-width="2"/>
  
  <!-- Main icon: Blueprint/Template -->
  <g transform="translate(128, 128)">
    <!-- Blueprint grid background -->
    <rect x="-50" y="-50" width="100" height="100" fill="none" stroke="#5865F2" stroke-width="1.5" opacity="0.3"/>
    <line x1="-50" y1="-25" x2="50" y2="-25" stroke="#5865F2" stroke-width="1" opacity="0.2"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#5865F2" stroke-width="1" opacity="0.2"/>
    <line x1="-50" y1="25" x2="50" y2="25" stroke="#5865F2" stroke-width="1" opacity="0.2"/>
    <line x1="-25" y1="-50" x2="-25" y2="50" stroke="#5865F2" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#5865F2" stroke-width="1" opacity="0.2"/>
    <line x1="25" y1="-50" x2="25" y2="50" stroke="#5865F2" stroke-width="1" opacity="0.2"/>
    
    <!-- Document/Template main shape -->
    <rect x="-35" y="-45" width="70" height="90" fill="#5865F2" rx="3"/>
    
    <!-- Document lines (text representation) -->
    <line x1="-25" y1="-30" x2="25" y2="-30" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="-25" y1="-15" x2="25" y2="-15" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="-25" y1="0" x2="15" y2="0" stroke="white" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Magic wand / automation sparkle -->
    <circle cx="30" cy="-35" r="5" fill="#FFD700"/>
    <circle cx="38" cy="-25" r="4" fill="#FFD700" opacity="0.7"/>
    <circle cx="25" cy="-20" r="3" fill="#FFD700" opacity="0.5"/>
    
    <!-- Spark lines -->
    <line x1="30" y1="-42" x2="30" y2="-50" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="37" y1="-35" x2="43" y2="-35" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="36" y1="-43" x2="41" y2="-48" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Text: SERVERMANAGER -->
  <text x="128" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#5865F2">
    SERVERMANAGER
  </text>
  <text x="128" y="222" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#5865F2" opacity="0.7">
    Handle Your Server
  </text>
</svg>
